<!doctype html>
<html>
  <head>
    <title>Movie Tracker</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        padding: 40px;
        text-align: center;
      }

      .box {
        background: white;
        padding: 20px;
        max-width: 500px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 90%;
        padding: 10px;
        margin-bottom: 10px;
      }

      .result {
        text-align: left;
        padding: 8px;
        cursor: pointer;
        border-bottom: 1px solid #ddd;
      }

      .result:hover {
        background: #eee;
      }

      img {
        width: 100%;
        border-radius: 8px;
      }

      button {
        padding: 10px 20px;
        background: black;
        color: white;
        border: none;
        margin-top: 10px;
        cursor: pointer;
      }

      #status {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>🎬 Movie Tracker</h2>

      <input
        id="search"
        placeholder="Search movie and press Enter"
        onkeydown="handleKey(event)"
      />

      <div id="results"></div>

      <div id="preview"></div>

      <button onclick="addMovie()">Add to Notion</button>

      <p id="status"></p>
    </div>

    <script>
      let selectedMovie = null;

      function handleKey(e) {
        if (e.key === "Enter") {
          searchMovies();
        }
      }

      async function searchMovies() {
        const q = document.getElementById("search").value.trim();
        if (!q) return;

        document.getElementById("results").innerHTML = "Searching...";

        try {
          const res = await fetch(`/api/search?query=${q}`);
          const data = await res.json();

          const container = document.getElementById("results");
          container.innerHTML = "";

          if (!data.results || data.results.length === 0) {
            container.innerHTML = "No results found";
            return;
          }

          data.results.forEach((m) => {
            const div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `<strong>${m.title}</strong> (${m.year})`;
            div.onclick = () => selectMovie(m);
            container.appendChild(div);
          });
        } catch (err) {
          document.getElementById("results").innerHTML =
            "Error loading results";
        }
      }

      function selectMovie(m) {
        selectedMovie = m;

        document.getElementById("preview").innerHTML = `
    <img src="${m.poster}" />
    <h3>${m.title} (${m.year})</h3>
    <p><b>Genre:</b> ${m.genre}</p>
    <p><b>Actors:</b> ${m.actors}</p>
    <p><b>Rating:</b> ${m.rating}</p>
    <p>${m.plot}</p>
  `;
      }

      async function addMovie() {
        if (!selectedMovie) {
          alert("Select a movie first");
          return;
        }

        const res = await fetch("/api/addMovie", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ imdbID: selectedMovie.imdbID }),
        });

        const data = await res.json();

        document.getElementById("status").innerText = res.ok
          ? "✅ Added to Notion"
          : "❌ " + data.error;
      }
    </script>
  </body>
</html>
