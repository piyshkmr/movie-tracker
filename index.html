<!doctype html>
<html>
  <head>
    <title>Movie Tracker</title>

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        background: #fafafa;
        margin: 0;
        padding: 40px 20px;
      }

      .container {
        max-width: 600px;
        margin: auto;
      }

      h2 {
        font-weight: 600;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
        outline: none;
      }

      input:focus {
        border-color: #999;
      }

      .results {
        margin-top: 10px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: white;
        overflow: hidden;
      }

      .result {
        display: flex;
        gap: 10px;
        padding: 10px;
        cursor: pointer;
        align-items: center;
        border-bottom: 1px solid #f0f0f0;
      }

      .result:hover {
        background: #f5f5f5;
      }

      .result img {
        width: 40px;
        height: 60px;
        object-fit: cover;
        border-radius: 4px;
      }

      .result-text {
        font-size: 14px;
      }

      .preview {
        margin-top: 20px;
        background: white;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 15px;
      }

      .preview img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .meta {
        font-size: 13px;
        color: #555;
        margin-bottom: 8px;
      }

      button {
        margin-top: 15px;
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        background: black;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }

      #status {
        margin-top: 10px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🎬 Movie Tracker</h2>

      <input
        id="search"
        placeholder="Search movie and press Enter..."
        onkeydown="handleKey(event)"
      />

      <div id="results" class="results"></div>

      <div id="preview" class="preview"></div>

      <button onclick="addMovie()">Add to Notion</button>

      <p id="status"></p>
    </div>

    <script>
      let selectedMovie = null;

      function handleKey(e) {
        if (e.key === "Enter") {
          searchMovies();
        }
      }

      async function searchMovies() {
        const q = document.getElementById("search").value.trim();
        if (!q) return;

        const container = document.getElementById("results");
        container.innerHTML = "Searching...";

        try {
          const res = await fetch(`/api/search?query=${q}`);
          const data = await res.json();

          container.innerHTML = "";

          if (!data.results || data.results.length === 0) {
            container.innerHTML = "No results found";
            return;
          }

          data.results.forEach((m) => {
            const div = document.createElement("div");
            div.className = "result";

            div.innerHTML = `
        <img src="${m.poster !== "N/A" ? m.poster : ""}" />
        <div class="result-text">
          <strong>${m.title}</strong><br/>
          ${m.year}
        </div>
      `;

            div.onclick = () => selectMovie(m);
            container.appendChild(div);
          });
        } catch (err) {
          container.innerHTML = "Error loading results";
        }
      }

      function selectMovie(m) {
        selectedMovie = m;

        document.getElementById("preview").innerHTML = `
    <img src="${m.poster}" />
    <h3>${m.title} (${m.year})</h3>
    <div class="meta"><b>Genre:</b> ${m.genre}</div>
    <div class="meta"><b>Actors:</b> ${m.actors}</div>
    <div class="meta"><b>Rating:</b> ⭐ ${m.rating}</div>
    <p>${m.plot}</p>
  `;
      }

      async function addMovie() {
        if (!selectedMovie) {
          alert("Select a movie first");
          return;
        }

        const res = await fetch("/api/addMovie", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ imdbID: selectedMovie.imdbID }),
        });

        const data = await res.json();

        document.getElementById("status").innerText = res.ok
          ? "✅ Added to Notion"
          : "❌ " + data.error;
      }
    </script>
  </body>
</html>
