<!doctype html>
<html>
  <head>
    <title>Movie Tracker</title>
  </head>
  <body>
    <h2>Movie Tracker</h2>

    <input id="search" placeholder="Search movie..." oninput="searchMovies()" />

    <div id="results"></div>

    <h3>Selected Movie</h3>
    <div id="selected"></div>

    <button onclick="addMovie()">Add to Notion</button>

    <p id="status"></p>

    <script>
      let selectedMovie = null;
      let debounceTimer;

      // 🔍 SEARCH
      function searchMovies() {
        clearTimeout(debounceTimer);

        debounceTimer = setTimeout(async () => {
          const query = document.getElementById("search").value;

          if (!query) return;

          const res = await fetch(`/api/search?query=${query}`);
          const data = await res.json();

          const container = document.getElementById("results");
          container.innerHTML = "";

          data.results.forEach((movie) => {
            const div = document.createElement("div");

            div.innerHTML = `
        <img src="${movie.poster}" width="50"/>
        <strong>${movie.title}</strong> (${movie.year})
      `;

            div.style.cursor = "pointer";
            div.onclick = () => selectMovie(movie);

            container.appendChild(div);
          });
        }, 300);
      }

      // 🎬 SELECT
      function selectMovie(movie) {
        selectedMovie = movie;

        document.getElementById("selected").innerHTML = `
    <img src="${movie.poster}" width="100"/><br/>
    <strong>${movie.title}</strong> (${movie.year})
  `;
      }

      // ➕ ADD (FIXED → uses imdbID)
      async function addMovie() {
        if (!selectedMovie) {
          alert("Select a movie first");
          return;
        }

        const res = await fetch("/api/addMovie", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ imdbID: selectedMovie.imdbID }),
        });

        const data = await res.json();

        document.getElementById("status").innerText = data.success
          ? "✅ Added to Notion"
          : "❌ Error: " + data.error;
      }
    </script>
  </body>
</html>
